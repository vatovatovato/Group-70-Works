    <link rel="stylesheet" href="./sign_up.css">

<body>
<img src="../../images/thumbnail.png" alt="">

<div class="main">
    <form>
        <h1 class="sign_up">Create an account</h1>
        <input type="text" class="name" placeholder="Username" id="user">
        <input type="email" class="email" placeholder="email" id="email">
        <input type="password" class="password" placeholder="Password" id="password">
        <input type="password" class="Spassword" placeholder="repeat password" id="rePassword">

        <div class="rememberBox">
            <input type="checkbox">
            <p>I accept all terms & conditions</p>
        </div>

            <button class="sign_upB" type="submit" id="btn"><a href="../../main/index.html" id="signA">Sign Up</a></button>
    </form> 
            <div class="Acc">
                <p>already have an account?:</p>

            </div>

    </div>


    <script src="./sign.js"></script>
