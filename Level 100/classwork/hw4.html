<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body>
    <!-- 4.შექმენი ღილაკი "Start", რომლის დაჭერის შემდეგ 2 წამში div უნდა შეიცვალოს ფერად (მაგ: წითლიდან მწვანეზე) -->

        <button id="btn" class="bg-blue-500 text-white px-4 py-3 pointer">Click for change</button>

        <div class="w-20 h-20 bg-red-500" id="container"></div>
        
        <script>
            const btn = document.getElementById('btn')
            const container = document.getElementById('container')
            
            btn.addEventListener('click', () => {
                setTimeout(() => {
                    container.style.backgroundColor = 'blue'
                }, 2000);
            })
        </script>
</body>
</html>
