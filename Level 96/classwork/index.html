<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="w-screen h-screen grid justify-center items-center">
    <!-- 1) შექმენი form TailwindCSS-ის გამოყენებით, სადაც გამოიყენებ 
    Floating Label Input-ს (peer magic). ფორმა უნდა შეიცავდეს მინიმუმ
     2-3 input-ს (მაგ: name, email, password). გამოიყენე peer კლასი, რომ label რეაგირებდეს 
     input-ის მდგომარეობაზე და გააკეთე ლამაზი UI.
2) label თავდაპირველად იყოს input-ის შიგნით (placeholder-ის მსგავსად)
3) focus-ის ან ტექსტის ჩაწერისას label გადავიდეს ზემოთ და შემცირდეს ზომაში
4) tailwind.config.js-ში დაამატე custom ფერები  -->


<form class="w-100 h-100 border-2 rounded-2xl text-center bg-gray-100">
    <div>
        <input type="text" placeholder=" "
        class="bg-white peer w-80 border-2 border-gray-300 focus:outline-none focus:border-gray-400
        mt-20"><br>
    
        <label 
        class="relative left-0 -top-6 peer-placeholder-shown:text-base 
        peer-focus:-top-6 peer-focus:text-sm peer-focus:text-gray-500 duration-300"
        >Enter your name</label>
    </div>

    <div>
        <input type="text" placeholder=" "
        class="bg-white peer w-80 border-2 border-gray-300 focus:outline-none focus:border-gray-400"><br>
    
        <label 
        class="relative left-0 -top-6 peer-placeholder-shown:text-base
         peer-focus:-top-6 peer-focus:text-sm peer-focus:text-gray-500 duration-300"
        >Enter your email</label>
    </div>

    <button class="border-2 p-2 w-50 rounded-2xl mt-10 bg-gray-200 border-gray-300 focus:border-gray-400 focus:text-gray-800 duration-300">submit</button>
</form>


</body>
</html>
