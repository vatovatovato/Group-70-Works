<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
        <!-- bg-blue-500 / background-color
    text-red-100   /feris shecvla da rame (jerjerobit)
    p-2 / padding (px shegvilia davumatot da gverdze gawevs)
    rounded / momrgvaleba (rounded-full mtliani momrgvlebaa)

    text-3xl / zomashi zrda (dziritadi maqsimumi aris 9xl)

    text-lg / large teqstis zom (default stilebi sazomi erteulis gareshe)
    text-base / basic zoma
    text-sm / small

    font-bold / font weight bold igive
    text-center / teqstis centrshi gadatana
    mx-auto / margin auto (cifrebic shegvilia)
    max-w-sm / max width small (cifrebis gamoyenebac shegvilia)
    shadow / box shadow
    py-2 / padding y 2px
    px-2 / padding x 2px
    hover:bg-red-100 / hover animaciebi ra ogond magis iqit rames tu dawer kide eg ar chaitvleba hoverad, tavidan unda gauwero mashin


    flex / display flex iqive
    justify-center / justify content center
    space-x / space between -->

    <!-- 1 -->
     <div class="bg-black text-white text-base text-center">Hello world</div>

     <!-- 2 -->
      <h2 class="text-blue-800 text-lg underline">hello</h2>

      <!-- 3 -->
       <div class="bg-gray-400 mx-w-sm p-4 font-bold">hello</div>
      
       <!-- 4 -->
        <div class="flex space-x-2">
         <div class="bg-red-400">h</div>
         <div class="bg-blue-400">h</div>
         <div class="bg-yellow-400">h</div>
        </div>

        <!-- 5 5) შექმენი კონტეინერი, რომლის შიგნით ელემენტები იქნება ვერტიკალურად დალაგებული და ცენტრში გასწორებული. -->
         <div class="flex justify-center bg-blue-400">
            <div class="">a</div>
            <div class="">a</div>
         </div>

         <!-- 6 6) გააკეთე ტექსტი, რომელიც მობილურზე პატარაა, ხოლო დიდ ეკრანზე უფრო დიდი ხდება. -->
          <p class="min-h-lg bg-red-600">text</p>

          <!-- 7 7) შექმენი ბლოკი, რომელსაც აქვს მომრგვალებული კუთხეები, თხელი ნაცრისფერი საზღვარი და ღია ფონი. -->
           <p class="rounded bg-gray-400">t</p>

           <!-- 8) გააკეთე ორი ელემენტი ისე, რომ ერთი იყოს მარცხენა მხარეს, მეორე — მარჯვენა მხარეს (ერთ ხაზზე). -->
            <a class="text-right">hello</a>
            <a class="">hello</a>

            <!-- 9) შექმენი ბლოკი, რომელსაც აქვს მწვანე ფონი, თეთრი ტექსტი და სქელი საზღვარი იმავე ფერის ტონალობაში. -->
             <div class="bg-green-500 text-white font-bold">a</div>

             <!-- „0) გააკეთე კონტეინერი ფიქსირებული სიმაღლით, სადაც შიგნით არსებული ელემენტი იქნება ზუსტად შუაში (ვერტიკალურად და ჰორიზონტალურად). --> -->
</body>
</html>
